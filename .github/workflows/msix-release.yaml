name: Build and Release MSIX (Avalonia)

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip running tests'
        required: false
        type: boolean
        default: false

jobs:
  Build-And-Release:
    runs-on: windows-2022

    env:
      AVALONIA_PROJECT_PATH: ./Src/Tsundoku.csproj
      WAP_PROJECT_PATH: ./TsundokuPackage/TsundokuPackage.wapproj
      MSIX_OUTPUT_SUBDIR: AppPackages

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Extract Version from csproj
      id: version
      run: |
        $content = Get-Content $env:AVALONIA_PROJECT_PATH -Raw
        $version = [regex]::Match($content, '(?<=<Version>)[^<]+').Value
        if (-not $version) {
            Write-Error "Could not find <Version> in $env:AVALONIA_PROJECT_PATH"
            exit 1
        }
        Write-Host "Version: $version (tag: v$version)"
        echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        echo "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      shell: pwsh

    - name: Sync Package.appxmanifest Version
      run: |
        $version = "${{ steps.version.outputs.version }}.0"
        $manifestPath = "./TsundokuPackage/Package.appxmanifest"
        $content = Get-Content $manifestPath -Raw
        $content = $content -replace '(?<=<Identity[^>]+Version=")[^"]+', $version
        Set-Content $manifestPath -Value $content -NoNewline
        Write-Host "Updated Package.appxmanifest Version to $version"
      shell: pwsh

    - name: Build Main Project (for tests)
      run: dotnet build ${{ env.AVALONIA_PROJECT_PATH }} --configuration Release
      shell: pwsh

    - name: Run Tests
      if: ${{ github.event.inputs.skip_tests != 'true' }}
      run: dotnet test ./Tests/Tsundoku.Tests.csproj --configuration Release --no-build --logger trx
      shell: pwsh

    - name: Restore Signing Certificate
      env:
        PFX_B64: ${{ secrets.PFX_BASE64 }}
        PFX_PWD: ${{ secrets.PFX_PASSWORD }}
      run: |
        $pfxPath = Join-Path $env:TEMP 'code-signing-cert.pfx'
        if ($env:PFX_B64 -and $env:PFX_PWD) {
            Write-Host 'PFX secrets found. Restoring certificate...'
            [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:PFX_B64))
            Write-Host "Certificate restored to: $pfxPath"
            "PACKAGE_CERT_KEY_FILE=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "PACKAGE_CERT_PASSWORD=$env:PFX_PWD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
            Write-Error 'PFX_BASE64 or PFX_PASSWORD secrets are missing or empty.'
            exit 1
        }
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: dotnet restore ${{ env.AVALONIA_PROJECT_PATH }}
      shell: pwsh

    - name: Build and Package MSIX Bundle
      id: build_msix
      run: |
          $buildCommand = "msbuild $env:WAP_PROJECT_PATH /p:Configuration=Release"

          $buildCommand += " /p:Platform=x64"
          $buildCommand += " /p:AppxPackageSigningEnabled=true"
          $buildCommand += " /p:PackageCertificateKeyFile=`"$env:PACKAGE_CERT_KEY_FILE`""
          $buildCommand += " /p:PackageCertificatePassword=`"$env:PACKAGE_CERT_PASSWORD`""
          $buildCommand += " /p:AppxBundle=Always"
          $buildCommand += " /p:AppxBundlePlatforms=`"x64`""
          $buildCommand += " /p:UapAppxPackageBuildMode=StoreUpload"
          $buildCommand += " /p:GenerateAppxPackageOnBuild=true"
          $buildCommand += " /p:AppxPackageDir=`"$env:MSIX_OUTPUT_SUBDIR\`""
          $buildCommand += " /p:BuildProjectReferences=true"
          $buildCommand += " /p:GenerateTestArtifacts=false"
          $buildCommand += " /p:InformationalVersion=`"${{ steps.version.outputs.tag }}`""
          $buildCommand += " /p:ContinuousIntegrationBuild=true"
          $buildCommand += " /v:normal"

          Write-Host "Executing build command: $buildCommand"
          Invoke-Expression $buildCommand

          $WAP_OUTPUT_DIR = Join-Path (Split-Path $env:WAP_PROJECT_PATH -Parent) "bin\Release"
          $MSIX_PACKAGES_DIR = Join-Path $WAP_OUTPUT_DIR $env:MSIX_OUTPUT_SUBDIR

          # StoreUpload mode produces .msixupload; fallback to .msixbundle
          $MSIX_BUNDLE_PATH = (Get-ChildItem -Path $MSIX_PACKAGES_DIR -Filter "*.msixupload" | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          if (-not $MSIX_BUNDLE_PATH) {
              $MSIX_BUNDLE_PATH = (Get-ChildItem -Path $MSIX_PACKAGES_DIR -Filter "*.msixbundle" | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          }
          if (-not $MSIX_BUNDLE_PATH) {
              Write-Error "Could not find MSIX bundle or upload file in $MSIX_PACKAGES_DIR directory."
              exit 1
          }
          $MSIX_BUNDLE_FILENAME = Split-Path -Leaf $MSIX_BUNDLE_PATH

          Write-Host "Found MSIX Package: $MSIX_BUNDLE_FILENAME"
          Write-Host "MSIX Packages Directory: $MSIX_PACKAGES_DIR"

          echo "msix_bundle_filename=$MSIX_BUNDLE_FILENAME" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "msix_packages_dir=$MSIX_PACKAGES_DIR" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      shell: pwsh

    - name: Update AppInstaller File With Tag Version
      run: |
        $VERSION = "${{ steps.version.outputs.tag }}".TrimStart("v")
        $MSIX_BUNDLE_FILENAME = "${{ steps.build_msix.outputs.msix_bundle_filename }}"

        Write-Host "Replacing version in TsundokuPackage/Package.appinstaller with $VERSION"

        $appinstallerContent = Get-Content "./TsundokuPackage/Package.appinstaller"
        $appinstallerContent = $appinstallerContent -replace '(?<=<MainBundle.+Uri=")[^"]+', "https://github.com/Sigrec/Tsundoku/releases/download/${{ steps.version.outputs.tag }}/$MSIX_BUNDLE_FILENAME"
        $appinstallerContent = $appinstallerContent -replace '(?<=<MainBundle.+Version=")[^"]+', $VERSION
        $appinstallerContent = $appinstallerContent -replace '(?<=<AppInstaller.+Version=")[^"]+', $VERSION
        $appinstallerContent = $appinstallerContent -replace '(?<=<UpdateSettings.+Uri=")[^"]+', "https://github.com/Sigrec/Tsundoku/releases/download/${{ steps.version.outputs.tag }}/Tsundoku.appinstaller"
        Set-Content "./TsundokuPackage/Package.appinstaller" -Value $appinstallerContent

        Write-Host "Updated .appinstaller content:"
        Get-Content "./TsundokuPackage/Package.appinstaller"
      shell: pwsh

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Release ${{ steps.version.outputs.tag }}
        generate_release_notes: true
        draft: false
        prerelease: false
        files: |
          ${{ steps.build_msix.outputs.msix_packages_dir }}/${{ steps.build_msix.outputs.msix_bundle_filename }}
          ./TsundokuPackage/Package.appinstaller
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
