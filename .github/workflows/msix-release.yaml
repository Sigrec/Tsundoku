name: Build and Release MSIX (Avalonia)

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip running tests'
        required: false
        type: boolean
        default: false

jobs:
  Build-And-Release:
    runs-on: windows-latest

    env:
      AVALONIA_PROJECT_PATH: ./Src/Tsundoku.csproj
      WAP_PROJECT_PATH: ./TsundokuPackage/TsundokuPackage.wapproj
      MSIX_OUTPUT_SUBDIR: AppPackages

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    - name: Extract Version from csproj
      id: version
      run: |
        $content = Get-Content $env:AVALONIA_PROJECT_PATH -Raw
        $version = [regex]::Match($content, '(?<=<Version>)[^<]+').Value
        if (-not $version) {
            Write-Error "Could not find <Version> in $env:AVALONIA_PROJECT_PATH"
            exit 1
        }
        Write-Host "Version: $version (tag: v$version)"
        echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        echo "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      shell: pwsh

    - name: Sync Package.appxmanifest Version
      run: |
        $version = "${{ steps.version.outputs.version }}.0"
        $manifestPath = "./TsundokuPackage/Package.appxmanifest"
        $content = Get-Content $manifestPath -Raw
        $content = $content -replace '(?<=<Identity[^>]+Version=")[^"]+', $version
        Set-Content $manifestPath -Value $content -NoNewline
        Write-Host "Updated Package.appxmanifest Version to $version"
      shell: pwsh

    - name: Build Main Project (for tests)
      run: dotnet build ${{ env.AVALONIA_PROJECT_PATH }} --configuration Release -r win-x64
      shell: pwsh

    - name: Run Tests
      if: ${{ github.event.inputs.skip_tests != 'true' }}
      run: dotnet test ./Tests/Tsundoku.Tests.csproj --configuration Release --logger trx
      shell: pwsh

    - name: Restore Signing Certificate
      env:
        PFX_B64: ${{ secrets.PFX_BASE64 }}
        PFX_PWD: ${{ secrets.PFX_PASSWORD }}
      run: |
        $pfxPath = Join-Path $env:TEMP 'code-signing-cert.pfx'
        if ($env:PFX_B64) {
            Write-Host 'PFX secret found. Restoring certificate...'
            [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:PFX_B64))
            Write-Host "Certificate restored to: $pfxPath"
            "PACKAGE_CERT_KEY_FILE=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "PACKAGE_CERT_PASSWORD=$env:PFX_PWD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
            Write-Error 'PFX_BASE64 or PFX_PASSWORD secrets are missing or empty.'
            exit 1
        }
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Restore NuGet Packages
      run: |
        dotnet restore ${{ env.AVALONIA_PROJECT_PATH }} -r win-x64 /p:Configuration=Release /p:Platform=x64
        msbuild ${{ env.WAP_PROJECT_PATH }} /t:Restore /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64
      shell: pwsh

    - name: Build and Package MSIX Bundle
      id: build_msix
      run: |
          $certFile = $env:PACKAGE_CERT_KEY_FILE
          $certPass = $env:PACKAGE_CERT_PASSWORD
          $outDir = $env:MSIX_OUTPUT_SUBDIR
          $version = '${{ steps.version.outputs.version }}'

          $msbuildArgs = @(
            $env:WAP_PROJECT_PATH,
            '/restore',
            '/p:Configuration=Release',
            '/p:Platform=x64',
            '/p:RuntimeIdentifier=win-x64',
            '/p:AppxPackageSigningEnabled=true',
            "/p:PackageCertificateKeyFile=$certFile",
            '/p:AppxBundle=Always',
            '/p:AppxBundlePlatforms=x64',
            '/p:UapAppxPackageBuildMode=StoreUpload',
            '/p:GenerateAppxPackageOnBuild=true',
            "/p:AppxPackageDir=$outDir\",
            '/p:BuildProjectReferences=true',
            '/p:GenerateTestArtifacts=false',
            "/p:InformationalVersion=$version",
            '/p:ContinuousIntegrationBuild=true',
            '/v:normal'
          )
          if ($certPass) {
            $msbuildArgs += "/p:PackageCertificatePassword=$certPass"
          }

          & msbuild @msbuildArgs

          $wapDir = Split-Path $env:WAP_PROJECT_PATH -Parent

          # Search for output files recursively since msbuild output path varies
          Write-Host "Searching for MSIX output under: $wapDir"
          Get-ChildItem -Path $wapDir -Recurse -Include "*.msixupload","*.msixbundle" | ForEach-Object { Write-Host "  Found: $($_.FullName)" }

          $MSIX_BUNDLE_PATH = (Get-ChildItem -Path $wapDir -Recurse -Filter "*.msixupload" | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          if (-not $MSIX_BUNDLE_PATH) {
              $MSIX_BUNDLE_PATH = (Get-ChildItem -Path $wapDir -Recurse -Filter "*.msixbundle" | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          }
          if (-not $MSIX_BUNDLE_PATH) {
              Write-Error "Could not find MSIX bundle or upload file under $wapDir"
              exit 1
          }
          $MSIX_PACKAGES_DIR = Split-Path $MSIX_BUNDLE_PATH -Parent
          $MSIX_BUNDLE_FILENAME = Split-Path -Leaf $MSIX_BUNDLE_PATH

          Write-Host "Found MSIX Package: $MSIX_BUNDLE_FILENAME"
          Write-Host "MSIX Packages Directory: $MSIX_PACKAGES_DIR"

          echo "msix_bundle_filename=$MSIX_BUNDLE_FILENAME" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "msix_packages_dir=$MSIX_PACKAGES_DIR" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      shell: pwsh

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: ${{ steps.version.outputs.tag }}
        generate_release_notes: true
        draft: false
        prerelease: false
        files: |
          ${{ steps.build_msix.outputs.msix_packages_dir }}/${{ steps.build_msix.outputs.msix_bundle_filename }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
