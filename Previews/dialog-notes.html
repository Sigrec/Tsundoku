<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tsundoku - Notes Dialog</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--menu-bg); }
  ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--btn-text); }

  body {
    font-family: 'Geist', sans-serif;
    background: var(--menu-bg);
    margin: 0;
  }

  :root {
    --menu-bg: #12293d; --username: #f1d2b6; --user-icon-border: #7b6b43;
    --search-bg: #473633; --search-border: #7b6b43; --search-text: #f1d2b6;
    --divider: #7b6b43; --btn-bg: #473633; --btn-bg-hover: #3e2a35;
    --btn-border: #7b6b43; --btn-border-hover: #7b6b43;
    --btn-text: #f1d2b6; --btn-text-hover: #12293d;
    --card-desc: #f9eae1; --card-publisher: #f1d2b6;
    --notes-bg: #473633; --notes-border: #7b6b43; --notes-text: #f9eae1;
  }

  .dialog {
    background: var(--menu-bg);
    border: none;
    border-radius: 0;
    width: 100%;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }

  .dialog-header {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--divider);
  }
  .dialog-title {
    font-size: 18px; font-weight: 800; color: var(--username);
    display: flex; align-items: center; gap: 8px;
  }
  .dialog-title i { font-size: 16px; color: var(--card-publisher); }
  .dialog-close {
    width: 32px; height: 32px; border-radius: 8px;
    border: 2px solid var(--btn-border); background: var(--btn-bg);
    color: var(--btn-text); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .dialog-close:hover {
    background: var(--btn-bg-hover); border-color: var(--btn-border-hover); color: var(--btn-text-hover);
  }

  .notes-area {
    padding: 16px 20px 20px;
  }

  .notes-textarea {
    width: 100%;
    height: 420px;
    background: var(--notes-bg);
    border: 2px solid var(--notes-border);
    border-radius: 10px;
    padding: 16px;
    color: var(--notes-text);
    font-size: 16px;
    font-weight: 600;
    font-family: 'Geist', sans-serif;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  .notes-textarea::placeholder { color: var(--notes-text); opacity: 0.3; }
  .notes-textarea:focus { border-color: var(--btn-border-hover); }
  .notes-textarea::-webkit-scrollbar-track { background: var(--notes-bg); }
</style>
</head>
<body>
<div class="dialog">
  <div class="dialog-header">
    <span class="dialog-title"><i class="fa-solid fa-note-sticky"></i> Notes</span>
    <button class="dialog-close"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="notes-area">
    <textarea class="notes-textarea" placeholder="Notes...">Mar Release
ルリドラゴン Vol 5 (Mar 4th) [IC]
タワーダンジョン Vol 6 (Mar 9th) [IC]
つぐもも Vol 36 (Mar 12th) [IC]
しのびごと Vol 7 (Mar 13th) [IC]

Apr Release
WITCHRIV Vol 2 (Apr 3rd)
この世界は不完全すぎる Vol 17 (Apr 8th)
ウスズミの果て Vol 5 (Apr 15th)
魔法使いの嫁 Vol 24 (Apr 20th)</textarea>
  </div>
</div>

<script>
document.querySelector('.dialog-close').addEventListener('click', () => {
  window.parent.postMessage('close-dialog', '*');
});
window.addEventListener('load', () => {
  const dialog = document.querySelector('.dialog');
  dialog.style.overflowY = 'visible';
  const h = dialog.offsetHeight;
  dialog.style.overflowY = '';
  window.parent.postMessage({ type: 'dialog-height', height: h }, '*');
});
</script>
</body>
</html>
